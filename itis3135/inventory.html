<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travis Alexander's Tenacious Ant | ITIS3135 | Inventory</title>
    <link rel="stylesheet" href="styles/default.css">
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="images/icon.png">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        th,
        td {
            padding: 1rem;
            text-align: left;
        }

        th {
            background-color: #2c2c2c;
            text-transform: uppercase;
            font-size: 0.9rem;
            color: var(--primary-color);
        }

        tr[class="read"] {
            background-image: linear-gradient(90deg, #2a3b2c, #1f2c21);
        }

        tr[class="to-read"] {
            background-image: linear-gradient(90deg, #3b2a2a, #2c1f1f);
        }

        tr[class="in-progress"] {
            background-image: linear-gradient(90deg, #2a343b, #1f262c);
        }

        span {
            display: inline-block;
        }

        tr[class="to-read"] span[class="status"] {
            border: 1px solid #ff7b72;
            color: #ff7b72;
            background-color: #2c1f1f;
            padding: 4px 8px;
            border-radius: 4px;
        }

        tr[class="read"] span[class="status"] {
            border: 1px solid #56d364;
            color: #56d364;
            background-color: #1f2c21;
            padding: 4px 8px;
            border-radius: 4px;
        }

        tr[class="in-progress"] span[class="status"] {
            border: 1px solid #58a6ff;
            color: #58a6ff;
            background-color: #1f262c;
            padding: 4px 8px;
            border-radius: 4px;
        }

        span[class^="rate"]>span {
            border-radius: 50%;
            margin: 0 4px;
            height: 16px;
            width: 16px;
            background-color: #333;
            vertical-align: middle;
        }

        span[class~="one"]>span:first-child {
            background-color: #ff8c00;
        }

        span[class~="two"]>span:first-child,
        span[class~="two"]>span:nth-child(2) {
            background-color: #ff8c00;
        }

        span[class~="three"]>span {
            background-color: #ff8c00;
        }
    </style>
</head>

<body>
    <div data-include="components/header.html"></div>

    <main class="container">
        <h2>Supply Inventory</h2>

        <table>
            <thead>
                <tr>
                    <th>Component</th>
                    <th>Brand</th>
                    <th>Category</th>
                    <th>Stock Status</th>
                    <th>Power Tier</th>
                </tr>
            </thead>
            <tbody>
                <tr class="read">
                    <td>GeForce RTX 5090</td>
                    <td>NVIDIA</td>
                    <td>GPU</td>
                    <td><span class="status">In Stock</span></td>
                    <td><span class="rate three"><span></span><span></span><span></span></span></td>
                </tr>
                <tr class="to-read">
                    <td>Ryzen 9 9800X3D</td>
                    <td>AMD</td>
                    <td>CPU</td>
                    <td><span class="status">Backordered</span></td>
                    <td><span class="rate three"><span></span><span></span><span></span></span></td>
                </tr>
                <tr class="in-progress">
                    <td>32GB DDR5 6000MHz</td>
                    <td>Corsair</td>
                    <td>RAM </td>
                    <td><span class="status">Incoming Delivery</span></td>
                    <td><span class="rate two"><span></span><span></span><span></span></span></td>
                </tr>
                <tr class="read">
                    <td>1TB NVMe M.2 SSD</td>
                    <td>Samsung</td>
                    <td>Storage</td>
                    <td><span class="status">In Stock</span></td>
                    <td><span class="rate one"><span></span><span></span><span></span></span></td>
                </tr>
            </tbody>
        </table>
    </main>

    <div data-include="components/footer.html"></div>
    <script src="scripts/HTMLInclude.min.js"></script>
    <script src="https://divonbriesen.github.io/web123/scripts/standards-check.js" defer></script>
</body>

</html>
