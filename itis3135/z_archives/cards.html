<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travis Alexander's Tenacious Ant | ITIS3135 | Cards</title>
    <link rel="stylesheet" href="styles/default.css">
    <style>
        #playing-cards {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 2rem 0;
        }

        .card {
            display: flex;
            justify-content: space-between;
            width: 160px;
            height: 240px;
            background-color: #2c2c2c;
            border: 2px solid var(--primary-color);
            border-radius: 10px;
            padding: 12px;
            box-shadow: 0 4px 8px #1a1a1a;
            box-sizing: border-box;
            color: #e0e0e0;
        }

        .left {
            align-self: flex-start;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
        }

        .middle {
            align-self: center;
            display: flex;
            flex-direction: column;
            font-size: 2.5rem;
            text-align: center;
        }

        .right {
            align-self: flex-end;
            font-size: 1.2rem;
            font-weight: bold;
            transform: rotate(180deg);
            text-align: center;
        }

        .queen {
            color: #ff00ff;
        }

        .soldier {
            color: #ff8c00;
        }

        .worker {
            color: #56d364;
        }
    </style>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="images/icon.png">
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
</head>

<body>
    <div data-include="components/header.html"></div>

    <main class="container">
        <h2>Playing Cards</h2>

        <div id="playing-cards">
            <div class="card queen">
                <div class="left">Q<br>👑</div>
                <div class="middle">
                    <div>🐜</div>
                </div>
                <div class="right">Q<br>👑</div>
            </div>

            <div class="card soldier">
                <div class="left">S<br>⚔️</div>
                <div class="middle">
                    <div>💻</div>
                    <div>💻</div>
                </div>
                <div class="right">S<br>⚔️</div>
            </div>

            <div class="card worker">
                <div class="left">3<br>⚡</div>
                <div class="middle">
                    <div>⚡</div>
                    <div>⚡</div>
                    <div>⚡</div>
                </div>
                <div class="right">3<br>⚡</div>
            </div>
        </div>
    </main>

    <div data-include="components/footer.html"></div>
    <script src="scripts/HTMLInclude.min.js"></script>
    <script src="https://divonbriesen.github.io/web123/scripts/standards-check.js" defer></script>
</body>

</html>
