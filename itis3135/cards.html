<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travis Alexander's Tenacious Ant | ITIS3135 | Cards</title>
    <link rel="stylesheet" href="styles/default.css">
    <style>
        #playing-cards {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 2rem 0;
        }

        .card-image {
            width: 160px;
            height: 240px;
            border: 2px solid var(--primary-color);
            border-radius: 10px;
            box-shadow: 0 4px 8px #1a1a1a;
            object-fit: cover; 
            background-color: #2c2c2c;
        }
    </style>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="images/icon.png">
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
</head>

<body>
    <div data-include="components/header.html"></div>

    <main class="container">
        <h2>Playing Cards</h2>

        <div id="playing-cards">
            <img src="images/card1.png" alt="Queen Ant Card" class="card-image">
            <img src="images/card2.png" alt="Soldier Ant Card" class="card-image">
            <img src="images/card3.png" alt="Worker Ant Card" class="card-image">
            <img src="images/card4.png" alt="Motherboard Card" class="card-image">
            <img src="images/card5.png" alt="CPU Card" class="card-image">
            <img src="images/card6.png" alt="GPU Card" class="card-image">
        </div>
    </main>

    <div data-include="components/footer.html"></div>
    <script src="scripts/HTMLInclude.min.js"></script>
    <script src="https://divonbriesen.github.io/web123/scripts/standards-check.js" defer></script>
</body>

</html>
