<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travis Alexander | ITIS 3135 Survey</title>
    <link rel="stylesheet" href="styles/default.css">
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
</head>

<body>


    <h1 id="title">Tenacious Ant Feedback Page</h1>
    <p id="description">Let us know how we can improve upcoming events.</p>

    <form id="survey-form">

        <div>
            <label id="name-label" for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required />
        </div>

        <div>
            <label id="email-label" for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your preferred email" required />
        </div>

        <div>
            <label id="number-label" for="number">Years of Industry Experience</label>
            <input type="number" id="number" name="experience" min="0" max="50" placeholder="e.g., 2" />
        </div>

        <div>
            <label for="dropdown">Which role best describes you?</label>
            <select id="dropdown" name="role">
                <option value="">Select your current role</option>
                <option value="student">Computer Science Student</option>
                <option value="network-engineer">Network Engineer</option>
                <option value="full-stack">Full-Stack Developer</option>
                <option value="ui-ux">UI/UX Designer</option>
                <option value="hardware">Hardware Technician</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div>
            <p>How would you rate the keynote on the Right to Repair movement?</p>
            <label>
                <input type="radio" name="keynote-rating" value="excellent" />
                Excellent
            </label>
            <label>
                <input type="radio" name="keynote-rating" value="good" />
                Good
            </label>
            <label>
                <input type="radio" name="keynote-rating" value="needs-improvement" />
                Needs Improvement
            </label>
        </div>

        <div>
            <p>Which workshop topics would you like to see more of next year? (Check all that apply)</p>
            <label>
                <input type="checkbox" name="topics" value="networking" />
                Advanced Routing & Wireshark Analysis
            </label><br>
            <label>
                <input type="checkbox" name="topics" value="react-node" />
                Building Full-Stack Apps (MERN)
            </label><br>
            <label>
                <input type="checkbox" name="topics" value="databases" />
                Database Normalization & MongoDB
            </label><br>
            <label>
                <input type="checkbox" name="topics" value="figma" />
                Figma Prototyping
            </label>
        </div>

        <div>
            <p>Any additional comments or suggestions?</p>
            <textarea id="comments" name="comments" rows="5" cols="40"
                placeholder="Tell us what you thought..."></textarea>
        </div>

        <div>
            <button type="submit" id="submit">Submit Feedback</button>
        </div>

    </form>

    <div data-include="components/header.html"></div>
    <h2>Survey</h2>

    <div data-include="components/footer.html"></div>
    <script src="scripts/HTMLInclude.min.js"></script>
</body>

</html>
